<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>응원봉 컨트롤 · TURAMI</title>
<link rel="icon" href="images/control-favicon.svg" type="image/svg+xml" />
<link rel="icon" href="images/control-favicon.png" sizes="32x32" type="image/png" />
<link rel="apple-touch-icon" href="images/control-apple-touch.png" />
<meta property="og:title" content="응원봉 컨트롤 · TURAMI (STAFF ONLY)" />
<meta property="og:description" content="2026 뚜라미 하계공연 응원봉 중앙제어 — 운영자 전용 페이지" />
<meta property="og:image" content="https://siyuet5500.github.io/turami2026_summer/images/control-og.png" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root{--gold:#f4d68a;--goldd:#d9a94e;--line:rgba(255,255,255,.12);--muted:#8a93b8}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:radial-gradient(120% 90% at 50% 10%,#0c1024,#06080e 70%);color:#e9edf9;font-family:'Noto Sans KR',sans-serif;-webkit-tap-highlight-color:transparent}
  .wrap{max-width:560px;margin:0 auto;padding:28px 20px 60px}
  .head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px}
  .head h1{font-family:'Gowun Batang',serif;font-size:1.5rem;letter-spacing:.06em;margin:0}
  .tag{font-family:'Space Mono',monospace;font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;color:var(--goldd)}
  .status{font-size:.8rem;color:var(--muted);margin:2px 0 22px}
  .status b{color:var(--gold);font-weight:500}
  .preview{position:relative;height:150px;border-radius:16px;border:1px solid var(--line);overflow:hidden;background:#05060c;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
  .preview canvas{position:absolute;inset:0;width:100%;height:100%}
  .preview .pv-lab{position:relative;font-family:'Space Mono',monospace;font-size:.66rem;letter-spacing:.18em;color:rgba(255,255,255,.5)}
  .now{font-size:.82rem;color:var(--muted);text-align:center;margin:0 0 24px}
  .now b{color:#fff;font-weight:500}
  .sec{font-family:'Space Mono',monospace;font-size:.64rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin:0 0 12px}
  .colors{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;margin-bottom:26px}
  .sw{aspect-ratio:1;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .12s,border-color .12s;box-shadow:0 0 0 1px rgba(255,255,255,.08) inset}
  .sw:hover{transform:scale(1.08)}
  .sw.sel{border-color:#fff;transform:scale(1.12)}
  .pats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .pat{padding:16px 8px;border-radius:12px;border:1px solid var(--line);background:rgba(255,255,255,.03);color:#e9edf9;font-size:.95rem;cursor:pointer;transition:.15s}
  .pat:hover{border-color:var(--goldd)}
  .pat.sel{background:var(--gold);color:#0a0d14;border-color:var(--gold);font-weight:700}
  .pat.off.sel{background:#39435e;color:#fff;border-color:#39435e}
  .hint{font-size:.74rem;color:var(--muted);line-height:1.7;margin-top:22px;border-top:1px solid var(--line);padding-top:16px}
  /* 비밀번호 게이트 */
  .gate{position:fixed;inset:0;background:#06080e;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:50;padding:24px}
  .gate h2{font-family:'Gowun Batang',serif;font-weight:400;margin:0}
  .gate input{background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:10px;color:#fff;padding:12px 16px;font-size:1rem;width:240px;text-align:center;letter-spacing:.1em}
  .gate button{background:var(--gold);color:#0a0d14;border:0;border-radius:10px;padding:12px 28px;font-weight:700;cursor:pointer}
  .gate .err{color:#ff8a8a;font-size:.82rem;min-height:1em}
  .hidden{display:none}
</style>
</head>
<body>
  <div class="gate" id="gate">
    <span class="tag">TURAMI · STAFF ONLY</span>
    <h2>응원봉 컨트롤</h2>
    <input id="pw" type="password" placeholder="비밀번호" autocomplete="off" />
    <button id="pwBtn" type="button">입장</button>
    <div class="err" id="pwErr"></div>
  </div>

  <div class="wrap hidden" id="panel">
    <div class="head">
      <h1>응원봉 컨트롤</h1>
      <span class="tag">Live</span>
    </div>
    <p class="status" id="status">연결 중…</p>

    <div class="preview"><canvas id="pv"></canvas><span class="pv-lab" id="pvLab">송출 미리보기</span></div>
    <p class="now">현재 송출 — <b id="nowColor">골드</b> · <b id="nowPat">맥동</b></p>

    <p class="sec">색상</p>
    <div class="colors" id="colors"></div>

    <p class="sec">패턴</p>
    <div class="pats" id="pats"></div>

    <p class="hint">버튼을 누르면 즉시 객석의 모든 응원봉 화면에 반영됩니다(0.1~0.5초).<br/>관객은 각자 폰에서 응원봉을 켜둔 상태여야 받아요. ‘무지개’와 ‘끄기’는 색상과 무관하게 동작합니다.</p>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* ====== 여기 두 개만 본인 값으로 ====== */
const PASS = "turami";   // 운영자 비밀번호 (원하는 값으로 변경)
const firebaseConfig = {
  apiKey: "AIzaSyCv7sHltUys91fb1lQeFYRqP9w2FriCUiY",
  authDomain: "turami2026-summer.firebaseapp.com",
  projectId: "turami2026-summer",
  storageBucket: "turami2026-summer.firebasestorage.app",
  messagingSenderId: "931198123638",
  appId: "1:931198123638:web:3d59430b2acea3fc976957"
};
/* ===================================== */

const COLORS=[
  {k:"gold",  n:"골드",   rgb:[244,214,138]},
  {k:"white", n:"화이트", rgb:[255,255,255]},
  {k:"blue",  n:"블루",   rgb:[120,170,255]},
  {k:"violet",n:"바이올렛",rgb:[185,150,255]},
  {k:"rose",  n:"로즈",   rgb:[255,150,180]},
  {k:"green", n:"그린",   rgb:[150,240,170]},
  {k:"red",   n:"레드",   rgb:[255,110,110]},
];
const PATS=[
  {k:"pulse",  n:"맥동"},
  {k:"solid",  n:"은은"},
  {k:"blink",  n:"깜빡"},
  {k:"wave",   n:"물결"},
  {k:"rainbow",n:"무지개"},
  {k:"off",    n:"끄기"},
];

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const stateRef=doc(db,"live","state");

let cur={color:"gold", pattern:"pulse"};

// ---- 게이트 ----
const gate=document.getElementById("gate"), panel=document.getElementById("panel");
function unlock(){ gate.classList.add("hidden"); panel.classList.remove("hidden"); sessionStorage.setItem("tm_ctrl","1"); init(); }
document.getElementById("pwBtn").addEventListener("click",()=>{
  if(document.getElementById("pw").value===PASS) unlock();
  else document.getElementById("pwErr").textContent="비밀번호가 올바르지 않습니다.";
});
document.getElementById("pw").addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("pwBtn").click();});
if(sessionStorage.getItem("tm_ctrl")==="1") unlock();

// ---- 패널 ----
function init(){
  const cb=document.getElementById("colors");
  COLORS.forEach(c=>{
    const b=document.createElement("button");
    b.className="sw"+(c.k===cur.color?" sel":""); b.style.background=`rgb(${c.rgb.join(",")})`;
    b.title=c.n; b.onclick=()=>{ cur.color=c.k; markColor(); send(); };
    b.dataset.k=c.k; cb.appendChild(b);
  });
  const pb=document.getElementById("pats");
  PATS.forEach(p=>{
    const b=document.createElement("button");
    b.className="pat"+(p.k==="off"?" off":"")+(p.k===cur.pattern?" sel":"");
    b.textContent=p.n; b.dataset.k=p.k;
    b.onclick=()=>{ cur.pattern=p.k; markPat(); send(); };
    pb.appendChild(b);
  });
  // 현재 상태 구독(다른 기기와 동기)
  onSnapshot(stateRef, s=>{
    const d=s.data(); if(!d) return;
    if(d.color) cur.color=d.color; if(d.pattern) cur.pattern=d.pattern;
    markColor(); markPat();
    document.getElementById("status").innerHTML="실시간 연결됨 · <b>송출 중</b>";
  }, ()=>{ document.getElementById("status").textContent="연결 오류 — 새로고침 해주세요."; });
  preview();
}
function markColor(){
  [...document.querySelectorAll(".sw")].forEach(b=>b.classList.toggle("sel",b.dataset.k===cur.color));
  document.getElementById("nowColor").textContent=(COLORS.find(c=>c.k===cur.color)||{}).n||cur.color;
}
function markPat(){
  [...document.querySelectorAll(".pat")].forEach(b=>b.classList.toggle("sel",b.dataset.k===cur.pattern));
  document.getElementById("nowPat").textContent=(PATS.find(p=>p.k===cur.pattern)||{}).n||cur.pattern;
}
async function send(){
  try{ await setDoc(stateRef,{color:cur.color, pattern:cur.pattern, ts:Date.now()}); }
  catch(e){ document.getElementById("status").textContent="전송 실패 — 규칙/연결 확인."; }
}

// ---- 미리보기 캔버스 (관객 화면과 동일 로직) ----
const pv=document.getElementById("pv"); const px=pv.getContext("2d");
function rgbOf(k){ const c=COLORS.find(x=>x.k===k); return c?c.rgb:[244,214,138]; }
function hsl2rgb(h,s,l){h/=360;const a=s*Math.min(l,1-l);const f=n=>{const k=(n+h*12)%12;return l-a*Math.max(-1,Math.min(k-3,9-k,1));};return [f(0)*255,f(8)*255,f(4)*255];}
function rgb2hsl(r,g,b){r/=255;g/=255;b/=255;const mx=Math.max(r,g,b),mn=Math.min(r,g,b);let h,s,l=(mx+mn)/2;if(mx===mn){h=s=0;}else{const d=mx-mn;s=l>.5?d/(2-mx-mn):d/(mx+mn);switch(mx){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;default:h=(r-g)/d+4;}h*=60;}return [h,s,l];}
function preview(){
  const r=pv.getBoundingClientRect(); pv.width=r.width*devicePixelRatio; pv.height=r.height*devicePixelRatio;
  const t=Date.now(); let [r0,g0,b0]=rgbOf(cur.color), bright;
  const slow=(Math.sin(t/1000*Math.PI)+1)/2, fast=(Math.sin(t/450*Math.PI)+1)/2;
  switch(cur.pattern){
    case "solid": bright=.92; break;
    case "blink": bright=(Math.floor(t/380)%2)?.95:.12; break;
    case "wave": { const h=rgb2hsl(r0,g0,b0); [r0,g0,b0]=hsl2rgb((h[0]+(t/40))%360,h[1],h[2]); bright=.6+slow*.35; break; }
    case "rainbow": { [r0,g0,b0]=hsl2rgb((t/25)%360,.75,.62); bright=.7+fast*.2; break; }
    case "off": bright=0; break;
    default: bright=.55+slow*.4+fast*.05;
  }
  const W=pv.width,H=pv.height,cx=W/2,cy=H/2;
  px.clearRect(0,0,W,H);
  if(bright>.01){ const R=W*0.4*(0.92+slow*0.08);
    const grad=px.createRadialGradient(cx,cy,0,cx,cy,R);
    grad.addColorStop(0,`rgba(${r0|0},${g0|0},${b0|0},${bright})`);
    grad.addColorStop(.5,`rgba(${r0|0},${g0|0},${b0|0},${bright*.5})`);
    grad.addColorStop(1,`rgba(${r0|0},${g0|0},${b0|0},0)`);
    px.fillStyle=grad; px.beginPath(); px.arc(cx,cy,R,0,7); px.fill();
  }
  requestAnimationFrame(preview);
}
</script>
</body>
</html>
